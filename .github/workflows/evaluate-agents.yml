name: Evaluate Agents

on:
  push:
    branches: [master]
    paths:
      - "eval/**"
      - ".github/workflows/evaluate-agents.yml"
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  evaluate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Run Agent Evaluations
        uses: microsoft/ai-agent-evals@v3-beta
        with:
          subscription: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          resource-group: rg-custDemo-FoundryObservability-jp-1
          project: proj-custDemo-FoundryObservebility-jp-001
          agent-ids: "patient-summary-agent:2,medication-reconciliation-agent:2,discharge-instructions-agent:2,bed-management-agent:2"
          data: eval/dataset.json
